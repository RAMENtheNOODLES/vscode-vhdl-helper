name: Build VSCode extension

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Compile extension
        run: npm run compile
      - name: Package extension
        run: npx vsce package --out vhdl-helper.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhdl-helper-vsix
          path: vhdl-helper.vsix
      - name: Get package version
        if: github.ref == 'refs/heads/main'
        id: package_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
      - name: Check release tag
        if: github.ref == 'refs/heads/main'
        id: tag_check
        run: |
          tag="v${{ steps.package_version.outputs.version }}"
          if git show-ref --tags --quiet --verify "refs/tags/$tag"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to VS Code Marketplace
        if: github.ref == 'refs/heads/main'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT" --packagePath vhdl-helper.vsix --skip-duplicate
      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package_version.outputs.version }}
          name: v${{ steps.package_version.outputs.version }}
          generate_release_notes: true
          files: vhdl-helper.vsix
