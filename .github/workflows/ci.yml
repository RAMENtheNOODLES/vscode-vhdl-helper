name: CI - Build VSCode Extension

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      # Optional: run tests if your package.json defines a test script
      - name: Run tests (if present)
        run: npm test --if-present

      - name: Package extension
        run: npx vsce package --out vhdl-helper.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhdl-helper-vsix
          path: vhdl-helper.vsix
          if-no-files-found: error
          retention-days: 14